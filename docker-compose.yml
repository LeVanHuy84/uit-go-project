version: '3.8'

services:
  # -------------------------
  # DATABASES & BROKERS
  # -------------------------
  trip-db:
    image: postgres:15-alpine
    container_name: trip-db
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trip
    volumes:
      - trip-data:/var/lib/postgresql/data
    networks:
      - ride-sharing-net

  user-db:
    image: postgres:15-alpine
    container_name: user-db
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user
    volumes:
      - user-data:/var/lib/postgresql/data
    networks:
      - ride-sharing-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - '6379:6379'
    command: >
      redis-server --notify-keyspace-events Ex
    networks:
      - ride-sharing-net
    volumes:
      - redis-data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - ride-sharing-net
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  # -------------------------
  # MICROSERVICES (no host ports)
  # -------------------------
  user-service:
    build:
      context: .
      dockerfile: ./apps/user-service/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - ./apps/user-service/.env
    depends_on:
      - user-db
    networks:
      - ride-sharing-net

  # auth-service:
  #   build:
  #     context: .
  #     dockerfile: ./apps/auth-service/Dockerfile
  #     target: runner
  #   restart: unless-stopped
  #   env_file:
  #     - ./apps/auth-service/.env
  #   networks:
  #     - ride-sharing-net

  trip-service:
    build:
      context: .
      dockerfile: ./apps/trip-service/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - ./apps/trip-service/.env
    depends_on:
      - rabbitmq
      - trip-db
    networks:
      - ride-sharing-net

  driver-service:
    build:
      context: .
      dockerfile: ./apps/driver-service/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - ./apps/driver-service/.env
    depends_on:
      - redis
      - rabbitmq
    networks:
      - ride-sharing-net

  # -------------------------
  # API GATEWAY (no host ports - LB will expose)
  # -------------------------
  api-gateway:
    build:
      context: .
      dockerfile: ./apps/api-gateway/Dockerfile
      target: runner
    restart: unless-stopped
    env_file:
      - ./apps/api-gateway/.env
    networks:
      - ride-sharing-net
    depends_on:
      - user-haproxy
      # - auth-haproxy
      - trip-haproxy
      - driver-haproxy

  # -------------------------
  # NGINX LB FOR GATEWAY (HTTP)
  # -------------------------
  gateway-lb:
    image: nginx:alpine
    container_name: gateway-lb
    ports:
      - '4000:4000'
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ride-sharing-net
    depends_on:
      - api-gateway

  # -------------------------
  # HAPRoxy TCP LBs FOR MICROSERVICES
  # Each HAProxy exposes the service TCP port to host.
  # -------------------------
  user-haproxy:
    image: haproxy:2.8-alpine
    container_name: user-haproxy
    ports:
      - '4001:4001'
    volumes:
      - ./haproxy/user.cfg:/usr/local/etc/haproxy/haproxy.cfg
    networks:
      - ride-sharing-net
    depends_on:
      - user-service

  # auth-haproxy:
  #   image: haproxy:2.8-alpine
  #   container_name: auth-haproxy
  #   ports:
  #     - '4004:4004'
  #   volumes:
  #     - ./haproxy/auth.cfg:/usr/local/etc/haproxy/haproxy.cfg
  #   networks:
  #     - ride-sharing-net
  #   depends_on:
  #     - auth-service

  trip-haproxy:
    image: haproxy:2.8-alpine
    container_name: trip-haproxy
    ports:
      - '4002:4002'
    volumes:
      - ./haproxy/trip.cfg:/usr/local/etc/haproxy/haproxy.cfg
    networks:
      - ride-sharing-net
    depends_on:
      - trip-service

  driver-haproxy:
    image: haproxy:2.8-alpine
    container_name: driver-haproxy
    ports:
      - '4003:4003'
    volumes:
      - ./haproxy/driver.cfg:/usr/local/etc/haproxy/haproxy.cfg
    networks:
      - ride-sharing-net
    depends_on:
      - driver-service

networks:
  ride-sharing-net:
    driver: bridge

volumes:
  redis-data:
  rabbitmq-data:
  user-data:
  trip-data:
