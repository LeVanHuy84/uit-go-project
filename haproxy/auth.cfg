global
    daemon
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend auth_front
    bind *:4004
    default_backend auth_back

backend auth_back
    balance roundrobin
    server s0 uit-go-project-auth-service-1:4004 check
    server s1 uit-go-project-auth-service-2:4004 check
    server s2 uit-go-project-auth-service-3:4004 check
