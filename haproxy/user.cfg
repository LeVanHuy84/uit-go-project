global
    daemon
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend user_front
    bind *:4001
    default_backend user_back

backend user_back
    balance roundrobin
    server s0 uit-go-project-user-service-1:4001 check
    server s1 uit-go-project-user-service-2:4001 check
