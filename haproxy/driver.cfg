global
    daemon
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend driver_front
    bind *:4003
    default_backend driver_back

backend driver_back
    balance roundrobin
    server s0 uit-go-project-driver-service-1:4003 check
    server s1 uit-go-project-driver-service-2:4003 check
    server s2 uit-go-project-driver-service-3:4003 check
