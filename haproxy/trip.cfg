global
    daemon
    maxconn 4096

defaults
    mode tcp
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend trip_front
    bind *:4002
    default_backend trip_back

backend trip_back
    balance roundrobin
    server s0 uit-go-project-trip-service-1:4002 check
    server s1 uit-go-project-trip-service-2:4002 check
    server s2 uit-go-project-trip-service-3:4002 check
