upstream api_gateway_backend {
    server uit-go-project-api-gateway-1:4000;
    server uit-go-project-api-gateway-2:4000;
}

server {
    listen 80;

    # 🔇 Tắt access log
    access_log off;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_pass http://api_gateway_backend;
    }

    location = /health {
        access_log off;   # (optional) tắt riêng cho path này
        proxy_pass http://api_gateway_backend/health;
    }
}
