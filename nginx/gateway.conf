upstream api_gateway_backend {
    server api-gateway:4000;  # hoặc port internal của api-gateway nếu khác
}


server {
    listen 4000;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_pass http://api_gateway_backend;
    }

    # optional: healthcheck endpoint proxying
    location = /health {
      proxy_pass http://api_gateway_backend/health;
    }
}
