version: '3.8'

services:
  k6:
    image: grafana/k6:latest
    container_name: k6
    volumes:
      - ./scripts:/scripts
    entrypoint: ['k6']
    working_dir: /scripts
    networks:
      - ride-sharing-net

networks:
  ride-sharing-net:
    external: true
    name: uit-go-project_ride-sharing-net
